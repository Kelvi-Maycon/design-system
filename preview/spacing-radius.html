<!doctype html>
<html lang="pt-BR" data-theme="light">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400..700;1,400..700&family=JetBrains+Mono:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles/index.css">
<link rel="stylesheet" href="_card.css">

</head>
<body><div class="card-shell">
<div class="label">Radius · curvas discretas — child = parent × 0.75</div>
<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:8px;">
  
  <div style="background:var(--surface-card);border:1px solid var(--border-subtle);border-radius:2px;height:78px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;">
    <span style="font-family:var(--font-body);font-weight:600;font-size:13px;color:var(--text-primary);">xs</span>
    <span style="font-family:var(--font-mono);font-size:10px;color:var(--text-muted);">2px</span>
  </div>
  <div style="background:var(--surface-card);border:1px solid var(--border-subtle);border-radius:4px;height:78px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;">
    <span style="font-family:var(--font-body);font-weight:600;font-size:13px;color:var(--text-primary);">sm</span>
    <span style="font-family:var(--font-mono);font-size:10px;color:var(--text-muted);">4px</span>
  </div>
  <div style="background:var(--surface-card);border:1px solid var(--border-subtle);border-radius:8px;height:78px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;">
    <span style="font-family:var(--font-body);font-weight:600;font-size:13px;color:var(--text-primary);">md</span>
    <span style="font-family:var(--font-mono);font-size:10px;color:var(--text-muted);">8px</span>
  </div>
  <div style="background:var(--surface-card);border:1px solid var(--border-subtle);border-radius:12px;height:78px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;">
    <span style="font-family:var(--font-body);font-weight:600;font-size:13px;color:var(--text-primary);">lg</span>
    <span style="font-family:var(--font-mono);font-size:10px;color:var(--text-muted);">12px</span>
  </div>
  <div style="background:var(--surface-card);border:1px solid var(--border-subtle);border-radius:16px;height:78px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;">
    <span style="font-family:var(--font-body);font-weight:600;font-size:13px;color:var(--text-primary);">xl</span>
    <span style="font-family:var(--font-mono);font-size:10px;color:var(--text-muted);">16px</span>
  </div>
  <div style="background:var(--surface-card);border:1px solid var(--border-subtle);border-radius:24px;height:78px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;">
    <span style="font-family:var(--font-body);font-weight:600;font-size:13px;color:var(--text-primary);">2xl</span>
    <span style="font-family:var(--font-mono);font-size:10px;color:var(--text-muted);">24px</span>
  </div>
  <div style="background:var(--surface-card);border:1px solid var(--border-subtle);border-radius:9999px;height:78px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;">
    <span style="font-family:var(--font-body);font-weight:600;font-size:13px;color:var(--text-primary);">full</span>
    <span style="font-family:var(--font-mono);font-size:10px;color:var(--text-muted);">∞</span>
  </div>
</div></div></body></html>
