<!doctype html>
<html lang="pt-BR" data-theme="light">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400..700;1,400..700&family=JetBrains+Mono:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles/index.css">
<link rel="stylesheet" href="_card.css">

</head>
<body><div class="card-shell">
<div class="label">Dark mode — chroma ×0.6, lightness +5% (não é light invertido)</div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:0;border:1px solid var(--border-subtle);border-radius:8px;overflow:hidden;">
  <div style="background:#f5f1e8;padding:18px;">
    <div style="font-family:var(--font-mono);font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:#8b857a;margin-bottom:10px;">Light</div>
    <div style="font-family:var(--font-display);font-size:34px;line-height:1;letter-spacing:-0.02em;color:#1a1814;">Reimagine.</div>
    <div style="display:flex;gap:6px;margin-top:14px;"><div style="width:32px;height:32px;background:#e9792b;border-radius:4px;"></div><div style="width:32px;height:32px;background:#fbf8f0;border:1px solid #d8d2c0;border-radius:4px;"></div><div style="width:32px;height:32px;background:#1a1814;border-radius:4px;"></div></div>
  </div>
  <div style="background:oklch(14% 0.008 50.7);padding:18px;">
    <div style="font-family:var(--font-mono);font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:oklch(60% 0.010 50.7);margin-bottom:10px;">Dark</div>
    <div style="font-family:var(--font-display);font-size:34px;line-height:1;letter-spacing:-0.02em;color:oklch(94% 0.012 50.7);">Reimagine.</div>
    <div style="display:flex;gap:6px;margin-top:14px;"><div style="width:32px;height:32px;background:oklch(65% 0.15 50.7);border-radius:4px;"></div><div style="width:32px;height:32px;background:oklch(18% 0.008 50.7);border:1px solid oklch(28% 0.010 50.7);border-radius:4px;"></div><div style="width:32px;height:32px;background:oklch(94% 0.012 50.7);border-radius:4px;"></div></div>
  </div>
</div></div></body></html>
