<!doctype html>
<html lang="pt-BR" data-theme="light">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400..700;1,400..700&family=JetBrains+Mono:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles/index.css">
<link rel="stylesheet" href="_card.css">

</head>
<body><div class="card-shell">
<div class="label">Depth · sem shadow — alternância de surfaces</div>
<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;">
  
  <div style="background:#F5F1E8;border:1px solid var(--border-subtle);border-radius:8px;padding:18px 16px;display:flex;flex-direction:column;gap:4px;">
    <span style="font-family:var(--font-body);font-weight:600;font-size:13px;color:var(--text-primary);">Surface · base</span>
    <span style="font-family:var(--font-mono);font-size:10px;color:var(--text-muted);">--surface-bg</span>
  </div>
  <div style="background:#EFEADE;border:1px solid var(--border-subtle);border-radius:8px;padding:18px 16px;display:flex;flex-direction:column;gap:4px;">
    <span style="font-family:var(--font-body);font-weight:600;font-size:13px;color:var(--text-primary);">Surface · alt</span>
    <span style="font-family:var(--font-mono);font-size:10px;color:var(--text-muted);">--surface-alt</span>
  </div>
  <div style="background:#FBF8F0;border:1px solid var(--border-subtle);border-radius:8px;padding:18px 16px;display:flex;flex-direction:column;gap:4px;">
    <span style="font-family:var(--font-body);font-weight:600;font-size:13px;color:var(--text-primary);">Surface · card</span>
    <span style="font-family:var(--font-mono);font-size:10px;color:var(--text-muted);">--surface-card</span>
  </div>
  <div style="background:#E7E1D1;border:1px solid var(--border-subtle);border-radius:8px;padding:18px 16px;display:flex;flex-direction:column;gap:4px;">
    <span style="font-family:var(--font-body);font-weight:600;font-size:13px;color:var(--text-primary);">Surface · tag</span>
    <span style="font-family:var(--font-mono);font-size:10px;color:var(--text-muted);">--surface-tag</span>
  </div>
</div></div></body></html>
