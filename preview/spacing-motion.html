<!doctype html>
<html lang="pt-BR" data-theme="light">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400..700;1,400..700&family=JetBrains+Mono:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles/index.css">
<link rel="stylesheet" href="_card.css">

</head>
<body><div class="card-shell">
<div class="label">Motion · 4 durations · 2 easings — anima só transform & opacity</div>
<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;">
  
  <div style="padding:14px 16px;border:1px solid var(--border-subtle);border-radius:4px;display:grid;gap:3px;">
    <span style="font-family:var(--font-body);font-weight:600;font-size:13px;color:var(--text-primary);">instant</span>
    <span style="font-family:var(--font-mono);font-size:11px;color:var(--text-muted);">100ms</span>
  </div>
  <div style="padding:14px 16px;border:1px solid var(--border-subtle);border-radius:4px;display:grid;gap:3px;">
    <span style="font-family:var(--font-body);font-weight:600;font-size:13px;color:var(--text-primary);">fast</span>
    <span style="font-family:var(--font-mono);font-size:11px;color:var(--text-muted);">200ms</span>
  </div>
  <div style="padding:14px 16px;border:1px solid var(--border-subtle);border-radius:4px;display:grid;gap:3px;">
    <span style="font-family:var(--font-body);font-weight:600;font-size:13px;color:var(--text-primary);">normal</span>
    <span style="font-family:var(--font-mono);font-size:11px;color:var(--text-muted);">300ms</span>
  </div>
  <div style="padding:14px 16px;border:1px solid var(--border-subtle);border-radius:4px;display:grid;gap:3px;">
    <span style="font-family:var(--font-body);font-weight:600;font-size:13px;color:var(--text-primary);">slow</span>
    <span style="font-family:var(--font-mono);font-size:11px;color:var(--text-muted);">500ms</span>
  </div>
</div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
  <div style="padding:14px 16px;border:1px solid var(--border-subtle);border-radius:4px;display:grid;gap:3px;">
    <span style="font-family:var(--font-body);font-weight:600;font-size:13px;color:var(--text-primary);">ease-out-quart</span>
    <span style="font-family:var(--font-mono);font-size:11px;color:var(--text-muted);">cubic-bezier(.25,1,.5,1)</span>
  </div>
  <div style="padding:14px 16px;border:1px solid var(--border-subtle);border-radius:4px;display:grid;gap:3px;">
    <span style="font-family:var(--font-body);font-weight:600;font-size:13px;color:var(--text-primary);">ease-out</span>
    <span style="font-family:var(--font-mono);font-size:11px;color:var(--text-muted);">cubic-bezier(.16,1,.3,1)</span>
  </div>
</div></div></body></html>
