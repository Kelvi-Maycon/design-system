<!doctype html>
<html lang="pt-BR" data-theme="light">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400..700;1,400..700&family=JetBrains+Mono:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles/index.css">
<link rel="stylesheet" href="_card.css">

</head>
<body><div class="card-shell">
<div class="label">Inputs (derived from tokens)</div>
<style>
.in { font-family:var(--font-body); font-size:15px; padding:10px 12px; border-radius:4px; border:1px solid var(--border-strong); background:var(--surface-card); color:var(--text-primary); width:100%; outline:none; transition:border-color .2s var(--ease-out-quart), box-shadow .2s var(--ease-out-quart); }
.in:focus { border-color:var(--color-primary-500); box-shadow:var(--ring-focus); }
.lbl { font-family:var(--font-mono); font-size:11px; letter-spacing:.16em; text-transform:uppercase; color:var(--text-muted); margin-bottom:5px; display:block; }
</style>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
  <div><span class="lbl">Título</span><input class="in" placeholder="Manuscrito sem nome"></div>
  <div><span class="lbl">Categoria</span><input class="in" value="Editorial"></div>
</div>
<div><span class="lbl">Resumo</span><textarea class="in" rows="2" placeholder="Lede em duas frases — densidade de revista, não SaaS."></textarea></div></div></body></html>
