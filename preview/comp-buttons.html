<!doctype html>
<html lang="pt-BR" data-theme="light">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400..700;1,400..700&family=JetBrains+Mono:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles/index.css">
<link rel="stylesheet" href="_card.css">

</head>
<body><div class="card-shell">
<div class="label">Buttons · primary · secondary · outline — 3 sizes</div>
<div style="display:flex;flex-wrap:wrap;gap:10px;align-items:center;">
  <button class="btn btn-sm btn-primary" type="button">Salvar</button>
  <button class="btn btn-sm btn-secondary" type="button">Visualizar</button>
  <button class="btn btn-sm btn-outline" type="button">Cancelar</button>
</div>
<div style="display:flex;flex-wrap:wrap;gap:10px;align-items:center;">
  <button class="btn btn-primary" type="button">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    Publicar edição
  </button>
  <button class="btn btn-secondary" type="button">Salvar rascunho</button>
  <button class="btn btn-outline" type="button">Voltar</button>
  <button class="btn btn-outline btn-icon-only" aria-label="Mais"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="5" cy="12" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="19" cy="12" r="1.5"/></svg></button>
</div>
<div style="display:flex;flex-wrap:wrap;gap:10px;align-items:center;">
  <button class="btn btn-lg btn-primary" type="button">Começar agora</button>
  <button class="btn btn-lg btn-outline" type="button">Conheça o catálogo</button>
</div></div></body></html>
