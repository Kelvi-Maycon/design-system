<!doctype html>
<html lang="pt-BR" data-theme="light">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400..700;1,400..700&family=JetBrains+Mono:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles/index.css">
<link rel="stylesheet" href="_card.css">

</head>
<body><div class="card-shell">
<div class="label">Sage · success / running</div>
<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px;">
  
  <div style="display:flex;flex-direction:column;border:1px solid var(--border-subtle);border-radius:8px;overflow:hidden;background:var(--surface-card);min-width:0;">
    <div style="height:54px;background:#dde0cc;"></div>
    <div style="padding:8px 10px 10px;display:grid;gap:1px;">
      <div style="font-family:var(--font-body);font-weight:600;font-size:12px;color:var(--text-primary);">Sage soft</div>
      <div style="font-family:var(--font-mono);font-size:10px;color:var(--text-secondary);">#DDE0CC</div>
      <div style="font-family:var(--font-mono);font-size:10px;color:var(--text-muted);">pill bg</div>
    </div>
  </div>
  
  <div style="display:flex;flex-direction:column;border:1px solid var(--border-subtle);border-radius:8px;overflow:hidden;background:var(--surface-card);min-width:0;">
    <div style="height:54px;background:#6f7a5c;"></div>
    <div style="padding:8px 10px 10px;display:grid;gap:1px;">
      <div style="font-family:var(--font-body);font-weight:600;font-size:12px;color:var(--text-primary);">Sage</div>
      <div style="font-family:var(--font-mono);font-size:10px;color:var(--text-secondary);">#6F7A5C</div>
      <div style="font-family:var(--font-mono);font-size:10px;color:var(--text-muted);">running / success</div>
    </div>
  </div>
</div>
<div style="display:flex;gap:10px;flex-wrap:wrap;">
  <span class="pill-positive"><span class="dot"></span> Rodando</span>
  <span class="pill-positive">✓ Concluído</span>
  <span class="pill-positive pill-positive--filled">Ativo</span>
</div>
<div class="label" style="margin-top:6px;">Status · warning / error / info</div>
<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;">
  
  <div style="display:flex;flex-direction:column;border:1px solid var(--border-subtle);border-radius:8px;overflow:hidden;background:var(--surface-card);min-width:0;">
    <div style="height:54px;background:oklch(70% 0.16 75);"></div>
    <div style="padding:8px 10px 10px;display:grid;gap:1px;">
      <div style="font-family:var(--font-body);font-weight:600;font-size:12px;color:var(--text-primary);">Warning</div>
      <div style="font-family:var(--font-mono);font-size:10px;color:var(--text-secondary);">oklch 70/.16/75</div>
      <div style="font-family:var(--font-mono);font-size:10px;color:var(--text-muted);">hue +24</div>
    </div>
  </div>
  
  <div style="display:flex;flex-direction:column;border:1px solid var(--border-subtle);border-radius:8px;overflow:hidden;background:var(--surface-card);min-width:0;">
    <div style="height:54px;background:oklch(52% 0.18 28);"></div>
    <div style="padding:8px 10px 10px;display:grid;gap:1px;">
      <div style="font-family:var(--font-body);font-weight:600;font-size:12px;color:var(--text-primary);">Error</div>
      <div style="font-family:var(--font-mono);font-size:10px;color:var(--text-secondary);">oklch 52/.18/28</div>
      <div style="font-family:var(--font-mono);font-size:10px;color:var(--text-muted);">hue −22</div>
    </div>
  </div>
  
  <div style="display:flex;flex-direction:column;border:1px solid var(--border-subtle);border-radius:8px;overflow:hidden;background:var(--surface-card);min-width:0;">
    <div style="height:54px;background:oklch(55% 0.10 240);"></div>
    <div style="padding:8px 10px 10px;display:grid;gap:1px;">
      <div style="font-family:var(--font-body);font-weight:600;font-size:12px;color:var(--text-primary);">Info</div>
      <div style="font-family:var(--font-mono);font-size:10px;color:var(--text-secondary);">oklch 55/.10/240</div>
      <div style="font-family:var(--font-mono);font-size:10px;color:var(--text-muted);">hue oposto</div>
    </div>
  </div>
</div></div></body></html>
