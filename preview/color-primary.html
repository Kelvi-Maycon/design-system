<!doctype html>
<html lang="pt-BR" data-theme="light">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400..700;1,400..700&family=JetBrains+Mono:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles/index.css">

</head>
<body><div class="card-shell">
<div class="label">Primary · Terracotta — OKLCH ramp hue 50.7</div>
<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:8px;">
  
  <div style="display:flex;flex-direction:column;border:1px solid var(--border-subtle);border-radius:8px;overflow:hidden;background:var(--surface-card);min-width:0;">
    <div style="height:54px;background:oklch(97% 0.02 50.7);"></div>
    <div style="padding:8px 10px 10px;display:grid;gap:1px;">
      <div style="font-family:var(--font-body);font-weight:600;font-size:12px;color:var(--text-primary);">50</div>
      <div style="font-family:var(--font-mono);font-size:10px;color:var(--text-secondary);">oklch 97/.02</div>
      <div style="font-family:var(--font-mono);font-size:10px;color:var(--text-muted);">tint</div>
    </div>
  </div>
  
  <div style="display:flex;flex-direction:column;border:1px solid var(--border-subtle);border-radius:8px;overflow:hidden;background:var(--surface-card);min-width:0;">

    <div style="padding:8px 10px 10px;display:grid;gap:1px;">
      <div style="font-family:var(--font-body);font-weight:600;font-size:12px;color:var(--text-primary);">100</div>

    </div>
  </div>
  
  <div style="display:flex;flex-direction:column;border:1px solid var(--border-subtle);border-radius:8px;overflow:hidden;background:var(--surface-card);min-width:0;">
    <div style="height:54px;background:oklch(75% 0.14 50.7);"></div>
    <div style="padding:8px 10px 10px;display:grid;gap:1px;">
      <div style="font-family:var(--font-body);font-weight:600;font-size:12px;color:var(--text-primary);">300</div>
      <div style="font-family:var(--font-mono);font-size:10px;color:var(--text-secondary);">oklch 75/.14</div>
      <div style="font-family:var(--font-mono);font-size:10px;color:var(--text-muted);">soft</div>
    </div>
  </div>
  
  <div style="display:flex;flex-direction:column;border:1px solid var(--border-subtle);border-radius:8px;overflow:hidden;background:var(--surface-card);min-width:0;">

    <div style="padding:8px 10px 10px;display:grid;gap:1px;">
      <div style="font-family:var(--font-body);font-weight:600;font-size:12px;color:var(--text-primary);">500 ★</div>
      <div style="font-family:var(--font-mono);font-size:10px;color:var(--text-secondary);">#E9792B</div>
      <div style="font-family:var(--font-mono);font-size:10px;color:var(--text-muted);">brand</div>
    </div>
  </div>

    <div style="height:54px;background:oklch(40% 0.18 50.7);"></div>
    <div style="padding:8px 10px 10px;display:grid;gap:1px;">
      <div style="font-family:var(--font-body);font-weight:600;font-size:12px;color:var(--text-primary);">700</div>

      <div style="font-family:var(--font-body);font-weight:600;font-size:12px;color:var(--text-primary);">800</div>
      <div style="font-family:var(--font-mono);font-size:10px;color:var(--text-secondary);">oklch 30/.14</div>

      <div style="font-family:var(--font-mono);font-size:10px;color:var(--text-secondary);">oklch 20/.08</div>
      <div style="font-family:var(--font-mono);font-size:10px;color:var(--text-muted);">deepest</div>
    </div>
  </div>
</div></div></body></html>
