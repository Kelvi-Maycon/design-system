<!doctype html>
<html lang="pt-BR" data-theme="light">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400..700;1,400..700&family=JetBrains+Mono:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles/index.css">
<link rel="stylesheet" href="_card.css">

</head>
<body><div class="card-shell">
<div class="label">Semantic tokens — auto-troca em dark mode</div>
<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:24px;">
  <div style="display:grid;gap:6px;">
    <div class="mono">--surface-bg → paper</div>
    <div class="mono">--surface-alt → paper-soft</div>
    <div class="mono">--surface-card → card</div>
    <div class="mono">--surface-tag → paper-tag</div>
  </div>
  <div style="display:grid;gap:6px;">
    <div class="mono">--text-primary → ink</div>
    <div class="mono">--text-secondary → ink-3</div>
    <div class="mono">--text-muted → muted</div>
    <div class="mono">--text-accent → primary-500</div>
    <div class="mono">--border-subtle → divider</div>
    <div class="mono">--border-strong → divider-2</div>
  </div>
</div></div></body></html>
