<!doctype html>
<html lang="pt-BR" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UI Kit · Paper Editorial</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400..700;1,400..700&family=JetBrains+Mono:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../styles/index.css">
<link rel="stylesheet" href="../../styles/showcase.css">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script>
// init theme before paint
(function(){
  var root = document.documentElement;
  var pref = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
  try { root.setAttribute("data-theme", localStorage.getItem("ds-theme") || pref); } catch(_){}
})();
</script>

<script type="text/babel" src="SectionHead.jsx"></script>
<script type="text/babel" src="Icons.jsx"></script>
<script type="text/babel" src="Manifesto.jsx"></script>
<script type="text/babel" src="Palette.jsx"></script>
<script type="text/babel" src="TypeStack.jsx"></script>
<script type="text/babel" src="Spacing.jsx"></script>
<script type="text/babel" src="Motion.jsx"></script>
<script type="text/babel" src="CardsGrid.jsx"></script>
<script type="text/babel" src="Inputs.jsx"></script>
<script type="text/babel" src="MenuShowcase.jsx"></script>
<script type="text/babel" src="Lists.jsx"></script>
<script type="text/babel" src="Feedback.jsx"></script>
<script type="text/babel" src="ThemeToggle.jsx"></script>

<script type="text/babel">
const App = () => (
  <>
    <ThemeToggle />
    <main className="shell" data-screen-label="Showcase">
      <Manifesto />
      <section className="bg-dotted-soft"><Palette /></section>
      <TypeStack />
      <Spacing />
      <Radius />
      <Depth />
      <Motion />
      <Buttons />
      <CardsGrid />
      <Inputs />
      <MenuShowcase />
      <Lists />
      <Feedback />
      <Compliance />
    </main>
  </>
);

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
